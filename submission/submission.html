<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Just wait a moment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      display: flex;
      align-items: center;
      flex-direction: column;
      justify-content: center;
      font-size: 100px;
      font-family: "Comic Sans MS", Arial, sans-serif;
      cursor: wait;
      border-radius: 44px;
      text-justify: distribute;
    }

    #text {
      width: 620px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-content: center;
      text-align: center;
      font-size: 56px;
      font-family: "Comic Sans MS", Arial, sans-serif;
      background-color: pink;
      color: rebeccapurple;
      border: 20px solid purple;
      border-radius: 100px;
    }
    #button {
      position: fixed;
      bottom: 60px;
      right: 10px;
      padding: 10px 20px;
      width: 200px;
      height: 150px;
      border: 10px solid rebeccapurple;
      border-radius: 24px;
      color: blue;
      background-color: cornflowerblue;
      cursor: wait;
      font-size: large;
      font-family: "Goudy Old Style", "Book Antiqua", serif;
    }
    #disclaimer {
      position: absolute;
      bottom: 0;
      font-size: 24px;
      font-family: "Courier New", "Lucida Console", monospace;
      text-align: center;
      color: green;
      background-color: lightyellow;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="overlay" class="hidden">
    <div id="text">Just wait a moment</div>
    </div><button id="button" disabled class="hidden">Skip</button>
    <div id="disclaimer">AI bots are causing skill issues in our servers and might disrupt your video. Have patience while our devs work hard to fix it</div>
  </div>

  <script type="text/javascript">
    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      const overlay = document.getElementById('overlay');
      const text = document.getElementById('text');
      const button = document.getElementById('button');
      let started = false;

      function sendToTop(message) {
        window.top.postMessage(message, '*');
      }

      //setting the time for delay between the loop to avoid it all happening at the same time
      const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

      //randomizes how long Just wait a moment shows and the delay in between the loop
      const momentDuration = Math.random() * 1420 + 690;

      const loopDelay = 1337 + Math.random() + 690;

      //loop Just wait a moment x amount of times (the amount can be easily changed if necessary)
      let count = 0;
      async function runLoop() {
        for (count = 0; count < 12; count++) {
          //pause video and show Just wait a moment
          sendToTop({ type: 'pause' });
          overlay.classList.remove('hidden');
          button.classList.add('hidden');
          text.textContent = 'Just wait a moment';
          //if the number of iterations goes over specified number (can be changed) the ad restarts
          if (count >= 12) {
            adSuccess();
            }

          await delay(momentDuration);

          //play video again after it has waited for the delay to be over and then wait for the loop to start again
          overlay.classList.add('hidden');
          button.classList.remove('hidden');
          sendToTop({ type: 'play' });

          await delay(loopDelay);
        }
        //set timeout for when ad restarts
        setTimeout(() => adSuccess(), 420);
      }

      //start the code when video starts
      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'adStarted' && !started) {
          started = true;
          //setting delay before the loop starts
          setTimeout(() => runLoop(), 1600);
        }

      //listen for time that remains in video and restart ad if 12 seconds or less are left of the video
      window.addEventListener('message', (event) => {
        if (event.data.type === 'timeupdate') {
          const {currentTime, duration} = event.data;
          const timeRemaining = duration - currentTime;
          if (timeRemaining <= 12) {
            adSuccess();
          }
        }
      })
      });
    })(window, document);
  </script>
</body>
</html>
